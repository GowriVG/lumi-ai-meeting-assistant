<div class="chat-page">

  <div class="chat-card">

    <!-- HEADER -->
    <div class="chat-header">
      <div class="bot-info">
         <div class="avatar">
          <img src="lumi-logo1.png" alt="LUMI" />
         </div>
        <div>
          <div class="bot-name">LUMI AI</div>
          <div class="status">● Online</div>
        </div>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="chat-body" #scrollContainer>

      <div *ngFor="let msg of messages"
           class="message-row"
           [ngClass]="msg.role">

        <!-- Assistant Avatar -->
        <div *ngIf="msg.role === 'assistant'" class="avatar">
          <img src="lumi-logo1.png" alt="LUMI" />
        </div>

        <div class="bubble">

        <!-- WORK ITEMS UI -->
        <ng-container *ngIf="msg.type === 'work-items'; else normalText">

  <div class="work-items">
<div *ngFor="let item of pendingActionItems" class="work-item">
  
  <div class="card-header-actions">
    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: #605e5c;">
      <input type="checkbox" [(ngModel)]="item.selected" />
      <span>Select for DevOps</span>
    </label>
    <span class="badge">{{ item.type | uppercase }}</span>
  </div>

  <div class="work-item-row">
    <input [(ngModel)]="item.title" 
           placeholder="Title" 
           class="input-field title-input" />
    
    <select [(ngModel)]="item.type" class="input-field" style="flex: 1; font-weight: 600; color: #0078d4;">
      <option>Epic</option>
      <option>Feature</option>
      <option>User Story</option>
      <option>Task</option>
      <option>Bug</option>
    </select>
  </div>

  <div class="work-item-row">
    <textarea [(ngModel)]="item.description" 
              placeholder="Description" 
              class="input-field"></textarea>
  </div>

  <div class="work-item-row" style="margin-bottom: 0;">
    <input [(ngModel)]="item.owner" 
           placeholder="Unassigned" 
           class="input-field" 
           style="font-size: 12px; flex: 1;" />
    
    <input [(ngModel)]="item.priority" 
           placeholder="Priority" 
           class="input-field" 
           style="font-size: 12px; flex: 1; text-align: right;" />
  </div>

</div>

    <!-- ✅ BUTTON -->
    <button class="create-btn" (click)="createSelectedItems()">
      Create Selected Items
    </button>

  </div>

</ng-container>

        <!-- ✅ NORMAL TEXT -->
        <ng-template #normalText>
  <div class="summary" [innerHTML]="msg.content"></div>
</ng-template>
        

        <div class="time">{{ msg.timestamp | date:'shortTime' }}</div>

      </div>
        <!-- User -->
        <div *ngIf="msg.role === 'user'" class="avatar user-avatar">U</div>

      </div>

      <!-- EMPTY STATE -->
      <div *ngIf="messages.length === 0" class="empty">
        Ask something about the meeting 👇
      </div>

      <!-- LOADER -->
      <div *ngIf="isTyping" class="message-row assistant">
        <div class="avatar">
          <img src="lumi-logo1.png" alt="LUMI" />
        </div>
        <div class="bubble typing">
          <app-loader message="Thinking..."></app-loader>
        </div>
      </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input">
      <input
        [(ngModel)]="userInput"
        (keydown.enter)="handleEnter($event)"
        placeholder="Type your message here..."
      />

      <button (click)="sendMessage()">
        ➤
      </button>
    </div>

  </div>

</div>
